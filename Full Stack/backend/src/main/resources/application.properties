# Server
server.port=8080


### Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/diseasedatabase
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
app.jwt.secret=${JWT_SECRET:YOUR_SUPER_SECRET_KEY}
app.jwt.expiration=86400000

# App
app.name=AI Health Chatbot - ArogyaBot
app.version=1.0.0

# ML API (Python Flask — run: python mlmodels/ml_api_server.py)
ml.api.url=http://localhost:5002
ml.api.timeout=3000

# Logging
logging.level.com.healthchatbot=INFO
logging.level.org.springframework.security=WARN

# Twilio Configuration
twilio.account.sid=${TWILIO_ACCOUNT_SID:YOUR_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN:YOUR_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+1234567890}
twilio.whatsapp.number=${TWILIO_WHATSAPP_NUMBER:whatsapp:+1234567890}

# ─── Feature #3: Outbreak Alert Scheduler (Spring @Scheduled) ─────────────────
# Cron format: "seconds minutes hours day-of-month month day-of-week"
# All times in UTC (IST = UTC + 5:30)

# Daily surveillance scan at 8:00 AM IST (2:30 AM UTC) every day
app.scheduler.daily-scan-cron=0 30 2 * * *

# Weekly health bulletin every Monday at 9:00 AM IST (3:30 AM UTC)
app.scheduler.weekly-bulletin-cron=0 30 3 * * MON

# High-risk tribal district scan every 6 hours (monsoon season: Jun-Oct)
app.scheduler.high-risk-cron=0 0 */6 * * *

# Scheduler thread pool — allows multiple jobs to run concurrently
spring.task.scheduling.pool.size=3
spring.task.scheduling.thread-name-prefix=arogyabot-scheduler-

# ─── Feature #2: Government Health Data API Sources ────────────────────────────
# These are the authoritative government data sources that the app mimics.
# Set to 'true' when live API keys are obtained from respective ministries.
gov.api.idsp.enabled=false
gov.api.idsp.base-url=https://idsp.mohfw.gov.in/api
gov.api.nhm.enabled=false
gov.api.nhm.base-url=https://nhm.odisha.gov.in/api
gov.api.cowin.enabled=false
gov.api.cowin.base-url=https://cdn-api.co-vin.in/api/v2

# ─── Async Thread Pool for Notification Broadcasting ─────────────────────────
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=500
spring.task.execution.thread-name-prefix=arogyabot-notify-
